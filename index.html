<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>timeblend demo</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; background:#111; color:#eee; }
    video, canvas { width:100%; max-width:480px; background:#000; border-radius:12px; margin-top:12px; }
    button, select { font-size:16px; padding:10px 14px; margin:6px 4px 6px 0; }
    a { color:#8cf; display:block; margin-top:12px; }
    .small { color:#aaa; font-size:14px; }
  </style>
</head>
<body>
  <h1>timeblend demo</h1>
  <p>Live camera → temporal average → actual timelapse video</p>

  <label>
    Average window:
    <select id="windowSec">
      <option value="1">1 sec</option>
      <option value="3" selected>3 sec</option>
      <option value="5">5 sec</option>
      <option value="10">10 sec</option>
    </select>
  </label>

  <br />

  <button id="startBtn">Start</button>
  <button id="stopBtn" disabled>Stop</button>

  <p id="status" class="small">Ready</p>

  <h2>Camera</h2>
  <video id="camera" autoplay playsinline muted></video>

  <h2>Blended preview</h2>
  <canvas id="output" width="640" height="360"></canvas>

  <h2>Result</h2>
  <video id="result" controls playsinline></video>
  <a id="download" style="display:none;">Download video</a>

  <script>
    const video = document.getElementById("camera");
    const canvas = document.getElementById("output");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const windowSecSelect = document.getElementById("windowSec");
    const statusText = document.getElementById("status");

    const resultVideo = document.getElementById("result");
    const downloadLink = document.getElementById("download");

    const width = 640;
    const height = 360;
    const sampleIntervalMs = 100; // 10fpsで平均用にサンプリング
    const outputFps = 30;         // 出力動画fps

    canvas.width = width;
    canvas.height = height;

    const captureCanvas = document.createElement("canvas");
    captureCanvas.width = width;
    captureCanvas.height = height;
    const captureCtx = captureCanvas.getContext("2d", { willReadFrequently: true });

    let cameraStream = null;
    let captureTimer = null;
    let emitTimer = null;

    let sum = null;
    let frameCount = 0;
    let averagedFrames = [];

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function resetAccumulator() {
      sum = new Float32Array(width * height * 4);
      frameCount = 0;
    }

    function createRecorder(stream) {
      const candidates = [
        "video/webm;codecs=vp9",
        "video/webm;codecs=vp8",
        "video/webm"
      ];

      const mimeType = candidates.find(type => MediaRecorder.isTypeSupported(type)) || "";
      return new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
    }

    function accumulateFrame() {
      if (!video.videoWidth || !video.videoHeight || !sum) return;

      captureCtx.drawImage(video, 0, 0, width, height);
      const image = captureCtx.getImageData(0, 0, width, height);
      const data = image.data;

      for (let i = 0; i < data.length; i += 4) {
        sum[i] += data[i];
        sum[i + 1] += data[i + 1];
        sum[i + 2] += data[i + 2];
      }

      frameCount++;
    }

    function emitAverageFrame() {
      if (!sum || frameCount === 0) return;

      const output = ctx.createImageData(width, height);
      const data = output.data;

      for (let i = 0; i < data.length; i += 4) {
        data[i] = sum[i] / frameCount;
        data[i + 1] = sum[i + 1] / frameCount;
        data[i + 2] = sum[i + 2] / frameCount;
        data[i + 3] = 255;
      }

      ctx.putImageData(output, 0, 0);

      // 重要：録画ではなく、平均フレームを保存する
      averagedFrames.push(output);

      statusText.textContent =
        `Captured blended frames: ${averagedFrames.length}`;

      resetAccumulator();
    }

    async function start() {
      resultVideo.removeAttribute("src");
      resultVideo.load();
      downloadLink.style.display = "none";

      averagedFrames = [];
      resetAccumulator();

      statusText.textContent = "Starting camera...";

      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment",
          width: { ideal: width },
          height: { ideal: height }
        },
        audio: false
      });

      video.srcObject = cameraStream;
      await video.play();

      const averageWindowMs = Number(windowSecSelect.value) * 1000;

      captureTimer = setInterval(accumulateFrame, sampleIntervalMs);
      emitTimer = setInterval(emitAverageFrame, averageWindowMs);

      startBtn.disabled = true;
      stopBtn.disabled = false;
      windowSecSelect.disabled = true;

      statusText.textContent = "Recording source frames...";
    }

    async function stop() {
      startBtn.disabled = true;
      stopBtn.disabled = true;

      clearInterval(captureTimer);
      clearInterval(emitTimer);

      // 端数分の平均フレームも出す
      emitAverageFrame();

      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
      }

      video.srcObject = null;

      if (averagedFrames.length === 0) {
        statusText.textContent = "No frames captured.";
        startBtn.disabled = false;
        windowSecSelect.disabled = false;
        return;
      }

      statusText.textContent =
        `Rendering timelapse video... ${averagedFrames.length} frames`;

      await renderTimelapseVideo();

      startBtn.disabled = false;
      windowSecSelect.disabled = false;
    }

    async function renderTimelapseVideo() {
      const stream = canvas.captureStream(outputFps);
      const recorder = createRecorder(stream);
      const chunks = [];

      recorder.ondataavailable = event => {
        if (event.data.size > 0) chunks.push(event.data);
      };

      const stopped = new Promise(resolve => {
        recorder.onstop = resolve;
      });

      recorder.start();

      // 保存した平均フレームを30fpsで短時間に再生して録画する
      for (const frame of averagedFrames) {
        ctx.putImageData(frame, 0, 0);
        await sleep(1000 / outputFps);
      }

      recorder.stop();
      await stopped;

      const blob = new Blob(chunks, { type: recorder.mimeType || "video/webm" });
      const url = URL.createObjectURL(blob);

      resultVideo.src = url;

      downloadLink.href = url;
      downloadLink.download = "timeblend.webm";
      downloadLink.textContent = "Download video";
      downloadLink.style.display = "block";

      const duration = averagedFrames.length / outputFps;
      statusText.textContent =
        `Done. Output: ${averagedFrames.length} frames / ${outputFps}fps ≒ ${duration.toFixed(2)} sec`;
    }

    startBtn.addEventListener("click", start);
    stopBtn.addEventListener("click", stop);
  </script>
</body>
</html>
