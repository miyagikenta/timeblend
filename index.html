<!doctype html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>lumetriq-lapse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="app.css" />
</head>

<body>
  <main class="container">
    <header>
      <h1>lumetriq-lapse</h1>
      <p>時間平均型タイムラプスのプロトタイプ</p>
      <small id="version"></small>
    </header>

    <article aria-label="Recording controls">
      <header>
        <h2>Recording</h2>
      </header>
      <form aria-label="Recording settings">
        <div class="grid">
          <label for="windowSec">
            Average window
            <select id="windowSec">
              <option value="1">1 sec</option>
              <option value="3" selected>3 sec</option>
              <option value="5">5 sec</option>
              <option value="10">10 sec</option>
              <option value="30">30 sec</option>
              <option value="60">60 sec</option>
              <option value="120">2 min</option>
              <option value="300">5 min</option>
              <option value="600">10 min</option>
              <option value="900">15 min</option>
              <option value="1800">30 min</option>
              <option value="3600">60 min</option>
            </select>
          </label>
          <label for="outputPreset">
            Output resolution
            <select id="outputPreset">
              <option value="720">720p (1280×720)</option>
              <option value="1080" selected>1080p (1920×1080)</option>
              <option value="2160">4K (3840×2160)</option>
            </select>
          </label>
          <label for="facingMode">
            Camera facing
            <select id="facingMode">
              <option value="environment" selected>Back (environment)</option>
              <option value="user">Front (user)</option>
            </select>
          </label>
          <label for="lowLightMode">
            Low light handling
            <select id="lowLightMode">
              <option value="none" selected>None</option>
              <option value="pause">Pause output when too dark</option>
              <option value="correct">Brightness / contrast correction</option>
            </select>
          </label>
        </div>
        <div class="grid" aria-label="Recording actions">
          <button type="button" id="startBtn" disabled>Start</button>
          <button type="button" id="stopBtn" class="secondary" disabled>Stop</button>
        </div>
        <p id="status" role="status" aria-live="polite">Ready</p>
      </form>
    </article>

    <article aria-label="Camera preview">
      <header>
        <h2>Camera</h2>
      </header>
      <div class="stage">
        <video id="camera" autoplay playsinline muted></video>
      </div>
    </article>

    <article aria-label="Blended preview">
      <header>
        <h2>Blended output</h2>
      </header>
      <div class="stage">
        <canvas id="output"></canvas>
      </div>
    </article>

    <article aria-label="Encoded result">
      <header>
        <h2>Result</h2>
      </header>
      <div class="stage">
        <video id="result" controls playsinline></video>
      </div>
      <footer>
        <a id="download" href="#" role="button" class="secondary outline" hidden>Download MP4</a>
      </footer>
    </article>

    <footer>
      <small>
        <a href="./privacy.html">プライバシーポリシー</a> |
        <a href="./terms.html">利用規約</a>
      </small>
    </footer>
  </main>

  <dialog id="consentModal">
    <article>
      <header>
        <button type="button" id="consentHeaderCloseBtn" aria-label="Close" rel="prev"></button>
        <h2>利用前の確認</h2>
      </header>
      <p>利用前に、プライバシーポリシーと利用規約を確認してください。</p>
      <p>
        <a href="./privacy.html" target="_blank" rel="noopener noreferrer">プライバシーポリシー</a> |
        <a href="./terms.html" target="_blank" rel="noopener noreferrer">利用規約</a>
      </p>
      <label for="consentModalCheck">
        <input type="checkbox" id="consentModalCheck" />
        内容を確認し、同意します
      </label>
      <footer>
        <button type="button" id="consentCloseBtn" class="secondary">閉じる</button>
        <button type="button" id="consentAcceptBtn" disabled>同意して続行</button>
      </footer>
    </article>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
