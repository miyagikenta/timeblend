<!doctype html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>timeblend</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="app.css" />
</head>

<body>
  <main class="container">
    <header>
      <h1>timeblend</h1>
      <p>GPU temporal averaging timelapse prototype</p>
      <small id="version"></small>
    </header>

    <article aria-label="Recording controls">
      <header>
        <h3>Recording</h3>
      </header>
      <div class="grid">
        <label for="windowSec">
          Average window
          <select id="windowSec">
            <option value="1">1 sec</option>
            <option value="3" selected>3 sec</option>
            <option value="5">5 sec</option>
            <option value="10">10 sec</option>
            <option value="30">30 sec</option>
            <option value="60">60 sec</option>
            <option value="120">2 min</option>
            <option value="300">5 min</option>
            <option value="600">10 min</option>
            <option value="900">15 min</option>
            <option value="1800">30 min</option>
            <option value="3600">60 min</option>
          </select>
        </label>
        <label for="outputPreset">
          Output resolution
          <select id="outputPreset">
            <option value="720">720p (1280×720)</option>
            <option value="1080" selected>1080p (1920×1080)</option>
            <option value="2160">4K (3840×2160)</option>
          </select>
        </label>
      </div>
      <div class="grid">
        <label for="facingMode">
          Camera facing
          <select id="facingMode">
            <option value="environment" selected>Back (environment)</option>
            <option value="user">Front (user)</option>
          </select>
        </label>
      </div>
      <small>縦持ちでは 720×1280 / 1080×1920 / 2160×3840。ノート PC など背面カメラが無い場合は、Start 時に前面へ切り替わります。</small>
      <div class="grid" aria-label="Recording actions">
        <button type="button" id="startBtn">Start</button>
        <button type="button" id="stopBtn" class="secondary" disabled>Stop</button>
      </div>
      <p id="status" role="status" aria-live="polite">Ready</p>
    </article>

    <article aria-label="Camera preview">
      <header>
        <h3>Camera</h3>
      </header>
      <div class="stage">
        <video id="camera" autoplay playsinline muted></video>
      </div>
    </article>

    <article aria-label="Blended preview">
      <header>
        <h3>Blended output</h3>
      </header>
      <div class="stage">
        <canvas id="output"></canvas>
      </div>
    </article>

    <article aria-label="Encoded result">
      <header>
        <h3>Result</h3>
      </header>
      <div class="stage">
        <video id="result" controls playsinline></video>
      </div>
      <footer>
        <a id="download" href="#" role="button" class="secondary outline" hidden>Download MP4</a>
      </footer>
    </article>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
