<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>timeblend</title>
  <link rel="stylesheet" href="app.css" />
</head>

<body>
  <div class="wrap">
    <header class="hero">
      <h1>timeblend</h1>
      <p class="tagline">GPU temporal averaging timelapse prototype</p>
      <p id="version" class="meta"></p>
    </header>

    <section class="panel" aria-label="Recording controls">
      <h2 class="panel-title">Recording</h2>
      <div class="fields">
        <div class="field">
          <label for="windowSec">Average window</label>
          <select id="windowSec">
            <option value="1">1 sec</option>
            <option value="3" selected>3 sec</option>
            <option value="5">5 sec</option>
            <option value="10">10 sec</option>
            <option value="30">30 sec</option>
            <option value="60">60 sec</option>
            <option value="120">2 min</option>
            <option value="300">5 min</option>
            <option value="600">10 min</option>
            <option value="900">15 min</option>
            <option value="1800">30 min</option>
            <option value="3600">60 min</option>
          </select>
        </div>
        <div class="field">
          <label for="outputPreset">Output resolution</label>
          <select id="outputPreset">
            <option value="720" selected>720p (1280×720)</option>
            <option value="1080">1080p (1920×1080)</option>
            <option value="2160">4K (3840×2160)</option>
          </select>
        </div>
        <div class="field">
          <label for="facingMode">Camera facing</label>
          <select id="facingMode">
            <option value="environment" selected>Back (environment)</option>
            <option value="user">Front (user)</option>
          </select>
        </div>
      </div>
      <p class="hint">縦持ちでは 720×1280 / 1080×1920 / 2160×3840。ノート PC など背面カメラが無い場合は、Start 時に前面へ切り替わります。</p>
      <div class="actions">
        <button type="button" id="startBtn" class="btn btn-primary">Start</button>
        <button type="button" id="stopBtn" class="btn btn-secondary" disabled>Stop</button>
      </div>
      <p id="status" class="status">Ready</p>
    </section>

    <section class="panel" aria-label="Camera preview">
      <h2 class="panel-title">Camera</h2>
      <div class="stage">
        <video id="camera" autoplay playsinline muted></video>
      </div>
    </section>

    <section class="panel" aria-label="Blended preview">
      <h2 class="panel-title">Blended output</h2>
      <div class="stage">
        <canvas id="output"></canvas>
      </div>
    </section>

    <section class="panel" aria-label="Encoded result">
      <h2 class="panel-title">Result</h2>
      <div class="stage">
        <video id="result" controls playsinline></video>
      </div>
      <a id="download" style="display:none;">Download MP4</a>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
